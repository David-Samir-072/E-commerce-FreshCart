@if (loadingPage1() || loadingPage2()) {
  <app-loading-page [loadingTitle]="'Loading wishList...'"></app-loading-page>
}@else if (wishList().length<1) {
  <app-empty-wish-list></app-empty-wish-list>
}
@else {
  <div class="min-h-screen bg-gray-50/50">
    <div class="bg-white border-b border-gray-100">
      <div class="container mx-auto px-4 py-8">
        <nav class="flex items-center gap-2 text-sm text-gray-500 mb-4">
          <a class="hover:text-primary-600 transition-colors" routerLink="/">Home</a><span>/</span
          ><span class="text-gray-900 font-medium">Wishlist</span>
        </nav>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-red-50 flex items-center justify-center">
              <svg
                data-prefix="fas"
                data-icon="heart"
                class="svg-inline--fa fa-heart text-xl text-red-500"
                role="img"
                viewBox="0 0 512 512"
                aria-hidden="true"
              >
                <path
                  fill="currentColor"
                  d="M241 87.1l15 20.7 15-20.7C296 52.5 336.2 32 378.9 32 452.4 32 512 91.6 512 165.1l0 2.6c0 112.2-139.9 242.5-212.9 298.2-12.4 9.4-27.6 14.1-43.1 14.1s-30.8-4.6-43.1-14.1C139.9 410.2 0 279.9 0 167.7l0-2.6C0 91.6 59.6 32 133.1 32 175.8 32 216 52.5 241 87.1z"
                ></path>
              </svg>
            </div>
            <div>
              <h1 class="text-2xl font-bold text-gray-900">My Wishlist</h1>
              <p class="text-gray-500 text-sm">{{wishList().length}} item saved</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="container mx-auto px-4 py-8">
      <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div
          class="hidden md:grid grid-cols-12 gap-4 px-6 py-4 bg-gray-50 border-b border-gray-100 text-sm font-medium text-gray-500"
        >
          <div class="col-span-6">Product</div>
          <div class="col-span-2 text-center">Price</div>
          <div class="col-span-2 text-center">Status</div>
          <div class="col-span-2 text-center">Actions</div>
        </div>
        <div class="divide-y divide-gray-100">
          @for (product of wishList(); track product._id) {
            <app-favorate-item
              [product]="product"
              [isInCart]="isInCart(product.id)"
              (getList)="getLoggedUserWishlistData()"
            ></app-favorate-item>
          }
        </div>
      </div>
      <div class="mt-8 flex items-center justify-between">
        <a
          class="text-gray-500 hover:text-primary-600 text-sm font-medium transition-colors"
          routerLink="/shop"
          >← Continue Shopping</a
        >
      </div>
    </div>
  </div>
}
