<nav aria-label="Breadcrumb" class="py-4">
  <div class="container mx-auto px-4">
    <ol class="flex items-center flex-wrap gap-1 text-sm">
      <li class="flex items-center">
        <a
          class="text-gray-500 hover:text-primary-600 transition flex items-center gap-1.5"
          routerLink="/"
          ><svg
            data-prefix="fas"
            data-icon="house"
            class="svg-inline--fa fa-house text-xs"
            role="img"
            viewBox="0 0 512 512"
            aria-hidden="true"
          >
            <path
              fill="currentColor"
              d="M277.8 8.6c-12.3-11.4-31.3-11.4-43.5 0l-224 208c-9.6 9-12.8 22.9-8 35.1S18.8 272 32 272l16 0 0 176c0 35.3 28.7 64 64 64l288 0c35.3 0 64-28.7 64-64l0-176 16 0c13.2 0 25-8.1 29.8-20.3s1.6-26.2-8-35.1l-224-208zM240 320l32 0c26.5 0 48 21.5 48 48l0 96-128 0 0-96c0-26.5 21.5-48 48-48z"
            ></path></svg
          >Home</a
        ><svg
          data-prefix="fas"
          data-icon="chevron-right"
          class="svg-inline--fa fa-chevron-right text-gray-400 text-xs mx-2"
          role="img"
          viewBox="0 0 320 512"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M311.1 233.4c12.5 12.5 12.5 32.8 0 45.3l-192 192c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L243.2 256 73.9 86.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l192 192z"
          ></path>
        </svg>
      </li>
      <li class="flex items-center">
        <a
          [routerLink]="['/categories', product().category.slug, product().category._id]"
          class="text-gray-500 cursor-pointer hover:text-primary-600 transition flex items-center gap-1.5"
          >{{ product().category?.name }}</a
        ><svg
          data-prefix="fas"
          data-icon="chevron-right"
          class="svg-inline--fa fa-chevron-right text-gray-400 text-xs mx-2"
          role="img"
          viewBox="0 0 320 512"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M311.1 233.4c12.5 12.5 12.5 32.8 0 45.3l-192 192c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L243.2 256 73.9 86.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l192 192z"
          ></path>
        </svg>
      </li>
      <li class="flex items-center">
        <a
          routerLink="/shop"
          [queryParams]="{subcategory:product().subcategory[0]?._id }"
          class="text-gray-500 cursor-pointer hover:text-primary-600 transition flex items-center gap-1.5"
          >{{ product().subcategory.length ? product().subcategory[0]?.name : '' }}</a
        ><svg
          data-prefix="fas"
          data-icon="chevron-right"
          class="svg-inline--fa fa-chevron-right text-gray-400 text-xs mx-2"
          role="img"
          viewBox="0 0 320 512"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M311.1 233.4c12.5 12.5 12.5 32.8 0 45.3l-192 192c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L243.2 256 73.9 86.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l192 192z"
          ></path>
        </svg>
      </li>
      <li class="text-gray-900 font-medium truncate max-w-xs">{{ product().title }}</li>
    </ol>
  </div>
</nav>
