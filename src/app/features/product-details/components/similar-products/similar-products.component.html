@if (productsList().length) {
  <section id="similar-products" class="py-10">
    <div class="container mx-auto px-4">
      <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
          <div class="h-8 w-1.5 bg-linear-to-b from-emerald-500 to-emerald-700 rounded-full"></div>
          <h2 class="text-2xl font-bold text-gray-800">
            You May Also <span class="text-emerald-600">Like</span>
          </h2>
        </div>
        <div class="flex space-x-2">
          <button (click)="swiperContainer.swiper.slidePrev()"
            class="h-10 w-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-primary-100 hover:text-primary-600 transition"
          >
            <svg
              data-prefix="fas"
              data-icon="chevron-left"
              class="svg-inline--fa fa-chevron-left"
              role="img"
              viewBox="0 0 320 512"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l192 192c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L77.3 256 246.6 86.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-192 192z"
              ></path></svg
            ><span class="sr-only">Previous</span></button
          ><button (click)="swiperContainer.swiper.slideNext()"
            class="h-10 w-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-primary-100 hover:text-primary-600 transition"
          >
            <svg
              data-prefix="fas"
              data-icon="chevron-right"
              class="svg-inline--fa fa-chevron-right"
              role="img"
              viewBox="0 0 320 512"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M311.1 233.4c12.5 12.5 12.5 32.8 0 45.3l-192 192c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L243.2 256 73.9 86.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l192 192z"
              ></path></svg
            ><span class="sr-only">Next</span>
          </button>
        </div>
      </div>
      <swiper-container
        #swiperContainer
        class="mySwiper"
         [loop]="true"
        [spaceBetween]="8"
        [breakpoints]="{
          '0': { slidesPerView: 1 },
          '640': { slidesPerView: 2 },
          '768': { slidesPerView: 3 },
          '1024': { slidesPerView: 4 },
        }"
      >
        @for (product of productsList(); track product._id) {
          <swiper-slide>
            <app-item-product [product]="product"></app-item-product>
          </swiper-slide>
        }
      </swiper-container>
    </div>
  </section>
}
