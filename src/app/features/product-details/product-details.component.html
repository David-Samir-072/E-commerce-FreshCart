@if (loading()) {
  <app-loading-product-details></app-loading-product-details>
} @else {
  <app-nav-product [product]="product()"></app-nav-product>
  <app-info-product [product]="product()"></app-info-product>
  <app-info-tabs-product [productId]="product()._id"></app-info-tabs-product>
  @if (product()?.category?._id) {
    <app-similar-products [categoryId]="product().category._id"> </app-similar-products>
  }
}
