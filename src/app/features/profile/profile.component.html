<div class="min-h-screen bg-gray-50/50">
  <div class="bg-gradient-to-br from-primary-600 via-primary-500 to-primary-400 text-white">
    <div class="container mx-auto px-4 py-10 sm:py-12">
      <nav class="flex items-center gap-2 text-sm text-white/70 mb-6">
        <a class="hover:text-white transition-colors duration-200" href="/">Home</a
        ><span class="text-white/40">/</span><span class="text-white font-medium">My Account</span>
      </nav>
      <div class="flex items-center gap-5">
        <div
          class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30"
        >
          <svg
            data-prefix="fas"
            data-icon="user"
            class="svg-inline--fa fa-user text-3xl"
            role="img"
            viewBox="0 0 448 512"
            aria-hidden="true"
          >
            <path
              fill="currentColor"
              d="M224 248a120 120 0 1 0 0-240 120 120 0 1 0 0 240zm-29.7 56C95.8 304 16 383.8 16 482.3 16 498.7 29.3 512 45.7 512l356.6 0c16.4 0 29.7-13.3 29.7-29.7 0-98.5-79.8-178.3-178.3-178.3l-59.4 0z"
            ></path>
          </svg>
        </div>
        <div>
          <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">My Account</h1>
          <p class="text-white/80 mt-1">Manage your addresses and account settings</p>
        </div>
      </div>
    </div>
  </div>
  <div class="container mx-auto px-4 py-8">
    <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
      <aside class="w-full lg:w-72 shrink-0">
        <nav class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div class="p-4 border-b border-gray-100">
            <h2 class="font-bold text-gray-900">My Account</h2>
          </div>
          <ul class="p-2">
            <li>
              <a
              routerLink="addresses" routerLinkActive
              #add="routerLinkActive"
              [class]="add.isActive?'activeTab':'inActive'"
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group"
                ><div
                  class="w-9 h-9 rounded-lg flex items-center justify-center transition-colors"
                >
                 <i class="fa-solid fa-location-dot text-sm"></i>
                </div>
                <span class="font-medium flex-1">My Addresses</span
                ><svg
                  data-prefix="fas"
                  data-icon="chevron-right"
                  class="svg-inline--fa fa-chevron-right text-xs transition-transform "
                  role="img"
                  viewBox="0 0 320 512"
                  aria-hidden="true"
                >
                  <path
                    fill="currentColor"
                    d="M311.1 233.4c12.5 12.5 12.5 32.8 0 45.3l-192 192c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L243.2 256 73.9 86.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l192 192z"
                  ></path></svg
              ></a>
            </li>
            <li>
              <a routerLink="profile-information" routerLinkActive
              #info="routerLinkActive"
              [class]="info.isActive?'activeTab':'inActive'"
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group"
                
                ><div
                  class="w-9 h-9 rounded-lg flex items-center justify-center transition-colors"
                >
                 <i class="fa-solid fa-user text-sm"></i>
                </div>
                <span class="font-medium flex-1">Profile Information</span
                ><svg
                  data-prefix="fas"
                  data-icon="chevron-right"
                  class="svg-inline--fa fa-chevron-right text-xs transition-transform text-gray-400"
                  role="img"
                  viewBox="0 0 320 512"
                  aria-hidden="true"
                >
                  <path
                    fill="currentColor"
                    d="M311.1 233.4c12.5 12.5 12.5 32.8 0 45.3l-192 192c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L243.2 256 73.9 86.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l192 192z"
                  ></path></svg
              ></a>
            </li>
            <li>
              <a routerLink="change-password" routerLinkActive
              #change="routerLinkActive"
              [class]="change.isActive?'activeTab':'inActive'"
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group"
                
                ><div
                  class="w-9 h-9 rounded-lg flex items-center justify-center transition-colors"
                >
                 <i class="fa-solid fa-gear text-sm"></i>
                </div>
                <span class="font-medium flex-1">Change Password</span
                ><svg
                  data-prefix="fas"
                  data-icon="chevron-right"
                  class="svg-inline--fa fa-chevron-right text-xs transition-transform text-gray-400"
                  role="img"
                  viewBox="0 0 320 512"
                  aria-hidden="true"
                >
                  <path
                    fill="currentColor"
                    d="M311.1 233.4c12.5 12.5 12.5 32.8 0 45.3l-192 192c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L243.2 256 73.9 86.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l192 192z"
                  ></path></svg
              ></a>
            </li>
          </ul>
        </nav>
      </aside>
      <div class="flex-1">
        <router-outlet></router-outlet>
      </div>

     
    </div>
  </div>
</div>
